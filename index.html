<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <title>Admin Dashboard</title>
    </head>
    <body>
        <div class="layout-container">
            <div class="sidebar">
                <div class="sidebar-element-title">
                    <div class="sidebar-element">
                        <img src="/images/view-dashboard.svg" class="icon">
                        <p class="tag">Dashboard</p>
                    </div>
                </div>
                <div class="sidebar-element-controls">
                    <div class="sidebar-element">
                        <img src="/images/home-outline.svg" class="icon">
                        <p class="tag">Home</p>
                    </div>
                    <div class="sidebar-element">
                        <img src="/images/card-account-details-outline.svg" class="icon">
                        <p class="tag">Profile</p>
                    </div>
                    <div class="sidebar-element">
                        <img src="/images/message-reply-outline.svg" class="icon">
                        <p class="tag">Messages</p>
                    </div>
                    <div class="sidebar-element">
                        <img src="/images/clock-time-three-outline.svg" class="icon">
                        <p class="tag">History</p>
                    </div>
                    <div class="sidebar-element">
                        <img src="/images/file-document-multiple-outline.svg" class="icon">
                        <p class="tag">Tasks</p>
                    </div>
                    <div class="sidebar-element">
                        <img src="/images/account-group.svg" class="icon">
                        <p class="tag">Communities</p>
                    </div>
                    <div class="sidebar-element">
                        <img src="/images/cog.svg" class="icon">
                        <p class="tag">Settings</p>
                    </div>
                    <div class="sidebar-element">
                        <img src="/images/help-box.svg" class="icon">
                        <p class="tag">Support</p>
                    </div>
                    <div class="sidebar-element">
                        <img src="/images/shield-check-outline.svg" class="icon">
                        <p class="tag">Privacy</p>
                    </div>
                </div>
            </div>
            <div class="header">
                <div class="header-search">
                    <img class="header-icon" src="images/magnify.svg">
                    <form action="" method="post">
                        <input class="search-bar" type="text" placeholder="Search..."></input>
                    </form>
                </div>
                <div class="header-user-settings">
                    <img class="header-icon" src="images/bell-ring-outline.svg">
                    <img id="user-settings-image" src="images/BabySinclair.jpeg">
                    <p id="user-name-settings">Marc San</p>
                </div>
                <div class="header-user-greeting">
                    <img id="user-image" src="images/BabySinclair.jpeg">
                    <div>
                        <p id="greeting">Hi there,</p>
                        <p id="user-name">M San (@msan)</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="header-button">New</button>
                    <button class="header-button">Upload</button>
                    <button class="header-button">Share</button>
                </div>
            </div>
            <div class="main-content">
                <p>main-content</p>
            </div>
        </div>
    </body>
</html>
